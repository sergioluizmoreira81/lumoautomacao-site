<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumo Automação - Em Breve</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { padding: 40px 20px; }
    h1 { font-size: 2.5rem; margin-bottom: 16px; color: #a78bfa; }
    p { font-size: 1.1rem; color: #ccc; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      background: #a78bfa22;
      border: 1px solid #a78bfa;
      color: #a78bfa;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lumo Automação</h1>
    <p>Nosso site está em construção.<br>Em breve estaremos no ar!</p>
    <span class="badge">🚧 Site em Construção</span>
  </div>
</body>
</html>
